<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>一元二次方程求解</title>
</head>
<body>
    <h1>一元二次方程 ax² + bx + c = 0 求解器</h1>

    <script>
        // 1. 三次调用 prompt 获取 a、b、c
        let a = parseFloat(prompt("请输入系数 a："));
        let b = parseFloat(prompt("请输入系数 b："));
        let c = parseFloat(prompt("请输入系数 c："));

        // 2. 计算判别式
        let delta = b * b - 4 * a * c;

        // 3. 计算两个根
        let x1 = (-b + Math.sqrt(delta)) / (2 * a);
        let x2 = (-b - Math.sqrt(delta)) / (2 * a);

        // 4. alert 弹出结果
        alert("方程的解为：\nx1 = " + x1 + "\nx2 = " + x2);

        // 5. console.log 输出
        console.log("x1 =", x1);
        console.log("x2 =", x2);
    </script>
</body>
</html>
