<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quadratic Equation Solver</title>
</head>
<body>
    <h1>一元二次方程求解器</h1>
    <p>点击按钮开始计算，将弹出输入框获取系数 a, b, c</p>
    <button onclick="solveQuadratic()">开始计算</button>

    <script>
        // 定义求解一元二次方程的函数
        function solveQuadratic() {
            // 1. 三次调用 prompt 获取用户输入的系数
            let a = parseFloat(prompt("请输入二次项系数 a (a > 0):"));
            let b = parseFloat(prompt("请输入一次项系数 b:"));
            let c = parseFloat(prompt("请输入常数项 c:"));

            // 输入合法性校验
            if (isNaN(a) || isNaN(b) || isNaN(c)) {
                alert("输入错误！请输入有效的数字");
                return;
            }
            if (a <= 0) {
                alert("根据题目要求，a 必须大于 0，请重新输入");
                return;
            }

            // 2. 计算判别式 delta
            let delta = b * b - 4 * a * c;

            // 判别式校验（题目假设 delta >= 0）
            if (delta < 0) {
                alert("判别式小于 0，无实数根（题目假设 delta >= 0，请重新输入）");
                return;
            }

            // 3. 计算两个根
            let sqrtDelta = Math.sqrt(delta);
            let x1 = (-b + sqrtDelta) / (2 * a);
            let x2 = (-b - sqrtDelta) / (2 * a);

            // 4. 用 alert 展示结果，同时用 console.log 打印
            let result = `一元二次方程 ${a}x² + ${b}x + ${c} = 0 的解为：\nx₁ = ${x1.toFixed(4)}\nx₂ = ${x2.toFixed(4)}`;
            alert(result);
            console.log(result);
        }
    </script>
</body>
</html>
